{{template "header"}}
<div class="section">
    <h1>{{.RateLimit}} Override Request Form</h1>
    <div id="form-error-banner"></div>
    <form id="override-form" referrerpolicy="no-referrer"
          data-rate-limit="{{.RateLimit}}"
          data-validate-field-path="{{.ValidateFieldPath}}"
          data-submit-request-path="{{.SubmitRequestPath}}"
          data-submit-success-path="{{.SubmitSuccessPath}}"> 
        {{ .FormHTML }}
        <button type="submit" class="primary btn-disabled" id="submit-button">Submit</button>
    </form>
</div>
<script src="/static/overrideRequest.js" defer></script>
{{template "footer"}}
